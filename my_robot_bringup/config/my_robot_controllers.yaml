controller_manager:
  ros__parameters:
  
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
  
    steering_joints_names: ["front_right_steering_joint", "front_left_steering_joint"]
    traction_joints_names: ["rear_right_wheel_joint", "rear_left_wheel_joint"]

    steering_track_width: 0.11
    traction_track_width: 0.11

    wheelbase: 0.15

    traction_wheels_radius: 0.02

    odom_frame_id: "odom"
    base_frame_id: "base_link"

    enable_odom_tf: true

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    cmd_vel_timeout: 0.5

    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0

    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0

/**:
  ros__parameters:
    pid_gains:
      position:
        front_right_steering_joint:
          p: 5.0
          i: 0.1
          d: 0.5
          i_clamp_max: 1.0
          i_clamp_min: -1.0
        front_left_steering_joint:
          p: 5.0
          i: 0.1
          d: 0.5
          i_clamp_max: 1.0
          i_clamp_min: -1.0
      velocity:
        rear_right_wheel_joint:
          p: 1.0
          i: 0.5
          d: 0.01
          i_clamp_max: 2.0
          i_clamp_min: -2.0
        rear_left_wheel_joint:
          p: 1.0
          i: 0.5
          d: 0.01
          i_clamp_max: 2.0
          i_clamp_min: -2.0
